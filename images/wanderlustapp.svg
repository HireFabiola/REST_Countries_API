<svg width="700" height="220" viewBox="0 0 700 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.10"></feDropShadow>
    </filter>

    <path id="textArc" d="M 150 145 Q 350 55 550 145"></path>
  </defs>

  <!-- soft background shape -->
  <g filter="url(#softShadow)">
    <path d="M120 82
         C155 40, 235 28, 330 38
         C410 28, 505 35, 560 72
         C610 106, 605 162, 548 182
         C470 206, 255 204, 170 190
         C105 179, 82 122, 120 82Z" fill="#F7F7F5"></path>
  </g>

  <!-- small whimsical stars -->
  <g fill="#8A8A8A" opacity="0.9">
    <path d="M158 66 L161 73 L168 76 L161 79 L158 86 L155 79 L148 76 L155 73 Z"></path>
    <path d="M525 60 L528 67 L535 70 L528 73 L525 80 L522 73 L515 70 L522 67 Z"></path>
  </g>

  <!-- moved subtitle upward -->
  <text x="500" y="44" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#8A8A8A" letter-spacing="1">
    explore • discover • wander
  </text>

  <!-- subtle dotted travel line -->
  <path d="M175 170 C220 192, 275 192, 320 170" stroke="#A3A3A3" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 10" opacity="0.8"></path>

  <!-- tiny simple airplane -->
  <g transform="translate(328 166) rotate(-6)">
    <path d="M0 0 L18 -6 C20 -7 21 -5.5 19.5 -4.5 L9 3 L19 9 C20.5 10.5 19.5 12 17.5 11.5 L7.5 8 L4 14 C3.2 15.4 1 15.4 0.5 14 L0.5 7.5 L-10 11 C-12 11.6 -13 10.2 -11.5 9 L-2 3.5 L-12 -0.5 C-13.5 -1.4 -12.8 -3 -10.8 -3 L0 -1.8 L0 -12 C0 -13.8 2.4 -13.8 2.8 -12 L2.8 -1.2 Z" fill="#6F6F6F"></path>
  </g>

  <!-- curved text -->
  <text font-family="'Snell Roundhand', 'Segoe Script', 'Lucida Handwriting', 'Brush Script MT', cursive" font-size="54" font-weight="500" letter-spacing="0.5" fill="#4B4B4B">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">
      WanderLustApp
    </textPath>
  </text>

  <!-- abstract compass, no circle -->
  <g transform="translate(585 145)">
    <!-- long north point -->
    <path d="M0 -26 L6 -4 L0 2 L-6 -4 Z" fill="#5C5C5C"></path>

    <!-- south point -->
    <path d="M0 26 L4 5 L0 0 L-4 5 Z" fill="#B0B0B0"></path>

    <!-- east point -->
    <path d="M26 0 L5 4 L0 0 L5 -4 Z" fill="#8A8A8A" opacity="0.9"></path>

    <!-- west point -->
    <path d="M-26 0 L-5 4 L0 0 L-5 -4 Z" fill="#C2C2C2" opacity="0.9"></path>

    <!-- center diamond -->
    <path d="M0 -8 L8 0 L0 8 L-8 0 Z" fill="#F7F7F5" stroke="#6F6F6F" stroke-width="1.4"></path>

    <!-- center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#6F6F6F"></circle>
  </g>
</svg>