<svg width="700" height="240" viewBox="0 0 700 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="textArc" d="M 150 150 Q 350 58 550 150"></path>
  </defs>

  <!-- stars -->
  <g fill="currentColor" opacity="0.5">
    <path d="M160 80 L163 87 L170 90 L163 93 L160 100 L157 93 L150 90 L157 87 Z"></path>
    <path d="M545 85 L548 92 L555 95 L548 98 L545 105 L542 98 L535 95 L542 92 Z"></path>
  </g>

  <!-- curved title -->
  <text font-family="'Snell Roundhand', 'Segoe Script', 'Lucida Handwriting', 'Brush Script MT', cursive" font-size="56" font-weight="500" letter-spacing="0.4" fill="currentColor">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">
      WanderLustApp
    </textPath>
  </text>

  <!-- compass -->
  <g transform="translate(350 170)">

    <!-- main points -->
    <path d="M0 -34 L7 -10 L0 -2 L-7 -10 Z" fill="currentColor" opacity="0.85"></path>
    <path d="M34 0 L10 7 L2 0 L10 -7 Z" fill="currentColor" opacity="0.6"></path>
    <path d="M0 34 L6 10 L0 2 L-6 10 Z" fill="currentColor" opacity="0.4"></path>
    <path d="M-34 0 L-10 7 L-2 0 L-10 -7 Z" fill="currentColor" opacity="0.7"></path>

    <!-- diagonals -->
    <path d="M20 -20 L9 -7 L5 -5 L7 -9 Z" fill="currentColor" opacity="0.5"></path>
    <path d="M20 20 L9 7 L5 5 L7 9 Z" fill="currentColor" opacity="0.35"></path>
    <path d="M-20 20 L-9 7 L-5 5 L-7 9 Z" fill="currentColor" opacity="0.5"></path>
    <path d="M-20 -20 L-9 -7 L-5 -5 L-7 -9 Z" fill="currentColor" opacity="0.35"></path>

    <!-- center -->
    <circle cx="0" cy="0" r="4" fill="currentColor"></circle>
    <circle cx="0" cy="0" r="12" fill="none" stroke="currentColor" stroke-opacity="0.3" stroke-width="1.1"></circle>

    <!-- WEST -->
    <text x="-75" y="5" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" fill="currentColor" opacity="0.7" letter-spacing="1">
      explore
    </text>

    <!-- EAST -->
    <text x="75" y="5" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" fill="currentColor" opacity="0.7" letter-spacing="1">
      wander
    </text>

    <!-- SOUTH -->
    <text x="0" y="62" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" fill="currentColor" opacity="0.7" letter-spacing="1">
      discover
    </text>

  </g>
</svg>