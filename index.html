<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where to Next?!!</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Link to custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <!-- TypeScript output JS -->
    <script defer src="main.js" defer></script>
</head>

<body>

    <!-- Minimal header bar with App name and dark/light mode switch-->
    <header>
        <div class="container py-5">
            <div class="d-flex justify-content-center align-items-center">
                <!-- Place heading to the left-->
                <div><img src="./images/FinalLogo.svg"></div>

                <!-- Place toggle switch to the right -->
                <div class="theme-toggle-wrap">
                    <i class="bi bi-sun-fill theme-icon" aria-hidden="true"></i>

                    <div class="form-check form-switch m-0">
                        <input class="form-check-input theme-toggle-input" type="checkbox" role="switch"
                            id="themeToggle" aria-label="Toggle dark mode">
                    </div>

                    <i class="bi bi-moon-stars-fill theme-icon" aria-hidden="true"></i>
                </div>
            </div>
        </div>
    </header>


    <main>
        <!-- Search and filter bars-->
        <div class="container pb-3">
            <div class="row g-2 align-items-center">

                <!-- Search field -->
                <div class="col-md-8">
                    <div class="input-group shadow-sm rounded">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>

                        <input type="text" class="form-control" placeholder="Where to next? Search a country..."
                            aria-label="Search for a country" id="searchInput">
                    </div>
                </div>

                <!-- Filter dropdown -->
                <div class="col-md-4">
                    <select class="form-select shadow-sm" id="regionFilter" aria-label="Filter by region">
                        <option selected value="">Filter by ...</option>
                    </select>
                </div>
            </div>
        </div>


        <!--Rows and columns for country info-->
      <div class="container py-3">
  <div class="row justify-content-center">

    <!-- inner constrained width -->
    <div class="col-md-10">
      <div class="row text-center">

        <div class="col-3">flag1</div>
        <div class="col-3">flag2</div>
        <div class="col-3">flag3</div>
        <div class="col-3">flag4</div>

      </div>
    </div>

  </div>
</div>
</body>

</html>
