<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where to Next?!!</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Link to custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <!-- TypeScript output JS -->
    <script type="module" defer src="../Project_HtmlCSSJavaScript/dist/main.js"></script>
</head>

<body>

    <!-- Minimal header bar with App name and dark/light mode switch-->
    <header>
        <div class="container py-5">
            <div class="d-flex justify-content-center align-items-center">
                <!-- Place heading to the left-->
                <div class="logo"><svg width="700" height="200" viewBox="0 0 700 200"
                        xmlns="http://www.w3.org/2000/svg">

                        <defs>
                            <!-- flatter curve -->
                            <path id="textArc" d="M 170 125 Q 350 65 530 125"></path>
                        </defs>

                        <!-- stars (slightly adjusted upward) -->
                        <g fill="currentColor" opacity="0.45">
                            <path d="M170 55 L173 62 L180 65 L173 68 L170 75 L167 68 L160 65 L167 62 Z"></path>
                            <path d="M530 60 L533 67 L540 70 L533 73 L530 80 L527 73 L520 70 L527 67 Z"></path>
                        </g>

                        <!-- curved title (slightly smaller + tighter) -->
                        <text
                            font-family="'Snell Roundhand', 'Segoe Script', 'Lucida Handwriting', 'Brush Script MT', cursive"
                            font-size="50" font-weight="500" letter-spacing="0.4" fill="currentColor">
                            <textPath href="#textArc" startOffset="50%" text-anchor="middle">
                                WanderLustApp
                            </textPath>
                        </text>

                        <!-- compass (moved up + slightly smaller feel) -->
                        <g transform="translate(350 140)">

                            <!-- main points -->
                            <path d="M0 -28 L6 -9 L0 -2 L-6 -9 Z" fill="currentColor" opacity="0.85"></path>
                            <path d="M28 0 L9 6 L2 0 L9 -6 Z" fill="currentColor" opacity="0.6"></path>
                            <path d="M0 28 L5 9 L0 2 L-5 9 Z" fill="currentColor" opacity="0.4"></path>
                            <path d="M-28 0 L-9 6 L-2 0 L-9 -6 Z" fill="currentColor" opacity="0.7"></path>

                            <!-- diagonals -->
                            <path d="M16 -16 L7 -6 L4 -4 L6 -7 Z" fill="currentColor" opacity="0.5"></path>
                            <path d="M16 16 L7 6 L4 4 L6 7 Z" fill="currentColor" opacity="0.35"></path>
                            <path d="M-16 16 L-7 6 L-4 4 L-6 7 Z" fill="currentColor" opacity="0.5"></path>
                            <path d="M-16 -16 L-7 -6 L-4 -4 L-6 -7 Z" fill="currentColor" opacity="0.35"></path>

                            <!-- center -->
                            <circle cx="0" cy="0" r="3.5" fill="currentColor"></circle>
                            <circle cx="0" cy="0" r="10" fill="none" stroke="currentColor" stroke-opacity="0.3"
                                stroke-width="1"></circle>

                            <!-- WEST -->
                            <text x="-60" y="4" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif"
                                font-size="14" fill="currentColor" opacity="0.7" letter-spacing="1">
                                explore
                            </text>

                            <!-- EAST -->
                            <text x="60" y="4" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif"
                                font-size="14" fill="currentColor" opacity="0.7" letter-spacing="1">
                                discover
                            </text>

                            <!-- SOUTH -->
                            <text x="0" y="50" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif"
                                font-size="14" fill="currentColor" opacity="0.7" letter-spacing="1">
                            all who wander are not lost
                            </text>

                        </g>
                    </svg></div>

                <!-- Place toggle switch to the right -->
                <div class="theme-toggle-wrap">
                    <i class="bi bi-sun-fill theme-icon" aria-hidden="true"></i>

                    <div class="form-check form-switch m-0">
                        <input class="form-check-input theme-toggle-input" type="checkbox" role="switch"
                            id="themeToggle" aria-label="Toggle dark mode">
                    </div>

                    <i class="bi bi-moon-stars-fill theme-icon" aria-hidden="true"></i>
                </div>
            </div>
        </div>
    </header>


    <main>
        <!-- Search and filter bars-->
        <div class="container pb-3">
            <div class="row g-2 align-items-center">

                <!-- Search field -->
                <div class="col-md-8">
                    <div class="input-group shadow-sm rounded">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>

                        <input type="text" class="form-control" placeholder="Where to next? Search a country..."
                            aria-label="Search for a country" id="searchInput">
                    </div>
                </div>

                <!-- Filter dropdown -->
                <div class="col-md-4">
                    <select class="form-select shadow-sm" id="regionFilter" aria-label="Filter by region">
                        <option selected value="">Filter by ...</option>
                    </select>
                </div>
            </div>
        </div>


        <!--Rows and columns for country info-->
        <div class="container py-3">
            <div class="row justify-content-center">
                <div class="col-md-12">
                    <div id="countryFlags" class="row text-center g-3">
                        <div class="col-3">flag1</div>
                        <div class="col-3">flag2</div>
                        <div class="col-3">flag3</div>
                        <div class="col-3">flag4</div>
                    </div>
                </div>

            </div>
        </div>
</body>

</html>
