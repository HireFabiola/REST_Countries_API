<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Link to custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <!-- TypeScript output JS -->
    <script type="module" defer src="../Project_HtmlCSSJavaScript/dist/main.js"></script>
</head>

<body>

    <!-- Minimal header bar with App name and dark/light mode switch-->
    <header>


        <div class="container py-5">
            <div class="d-flex justify-content-start align-items-center flex-column flex-md-row">
                <!-- Place heading to the left-->
                <div class="logo"><img id="logoImage" src="../Project_HtmlCSSJavaScript/images/WhiteLogo.png"
                        width="auto" height="200"></div>


                <div class="d-flex justify-content-center w-100">
                    <div id="travelCounter" class="travel-counter text-center"></div>
                </div>


                <div class="header-controls d-flex flex-column">
                    <div class="d-flex align-items-center justify-content-end">
                        <!-- Login Link -->
                        <a href="#" id="authLink" class="login-link text-decoration-none text-body"
                            data-bs-toggle="modal" data-bs-target="#authModal">
                            Login / Register
                        </a>
                    </div>

                    <div>
                        <span id="welcomeUser" class="login-link text-body"></span>
                        <a href="#" id="logoutLink" class="login-link text-decoration-none text-body d-none">Logout</a>
                    </div>

                    <!-- Theme Toggle -->
                    <div class="theme-toggle-wrap d-flex align-items-center gap-2">
                        <i class="bi bi-sun-fill theme-icon"></i>

                        <div class="form-check form-switch m-0">
                            <input class="form-check-input theme-toggle-input" type="checkbox" id="themeToggle">
                        </div>

                        <i class="bi bi-moon-stars-fill theme-icon"></i>
                    </div>
                </div>
            </div>
    </header>


    <main id="onLoadLayout">
        <!-- Search and filter bars-->
        <div class="container pb-3">
            <div class="row g-2 align-items-center">

                <!-- Search field -->
                <div class="col-md-9">
                    <form id="searchForm">
                        <div class="input-group shadow-sm rounded">

                            <span class="input-group-text">
                                <i class="bi bi-search"></i>
                            </span>

                            <input id="searchField" type="text" class="form-control" placeholder="Search a country..."
                                aria-label="Search for a country">

                            <button class="btn btn-secondary" type="submit">
                                Search
                            </button>
                        </div>
                    </form>
                </div>


                <!-- Filter dropdown -->
                <div class="col-md-3">
                    <select class="form-select shadow-sm" id="regionFilter">
                        <option selected value="">Filter by region</option>
                        <option value="visited">Visited</option>
                        <option value="africa">Africa</option>
                        <option value="americas">Americas</option>
                        <option value="asia">Asia</option>
                        <option value="europe">Europe</option>
                        <option value="oceania">Oceania</option>
                    </select>
                </div>

            </div>
        </div>


        <!--Rows and columns for country info-->
        <div class="container py-3">
            <div class="row justify-content-center g-5">
                <div class="col-md-12">
                    <div id="countryFlags" class="row text-center g-3">
                        <!-- <div class="col-3"></div>
                        <div class="col-3"></div>
                        <div class="col-3"></div>
                        <div class="col-3"></div>-->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="newLayout" class="d-none"> </div><!--Div container for layout on listener events-->

    <!--Login/Registration modal-->
    <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="authModalLabel">Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab"
                                data-bs-target="#login-pane" type="button" role="tab">
                                Login
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab"
                                data-bs-target="#register-pane" type="button" role="tab">
                                Register
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="login-pane" role="tabpanel"
                            aria-labelledby="login-tab">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="loginEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="loginEmail" required>
                                </div>

                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="loginPassword" required>
                                </div>

                                <div id="loginMessage" class="small mb-3"></div>

                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="register-pane" role="tabpanel" aria-labelledby="register-tab">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="registerName" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="registerName" required>
                                </div>

                                <div class="mb-3">
                                    <label for="registerEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="registerEmail" required>
                                </div>

                                <div class="mb-3">
                                    <label for="registerPassword" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="registerPassword" required>
                                </div>

                                <div id="registerMessage" class="small mb-3"></div>

                                <button type="submit" class="btn btn-primary w-100">Register</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
